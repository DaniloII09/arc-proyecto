name: Continuous Integration

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: ./api
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/windbag-api:latest

      - name: Build and push windbag web image
        uses: docker/build-push-action@v5
        with:
          context: ./web-windbag
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/windbag-web:latest

      - name: Build and push crypto web image
        uses: docker/build-push-action@v5
        with:
          context: ./web-crypto
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/crypto-web:latest